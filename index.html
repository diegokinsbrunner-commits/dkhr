⚠ Documento de demostración. Activá la API para

const Spinner=()=>(
  <div style={{display:"flex",gap:6,alignItems:"center",justifyContent:"center",padding:"12px 0"}}>
    {[0,1,2].map(i=><div key={i} style={{width:5,height:5,borderRadius:"50%",background:G,animation:`spin 1s ease ${i*.18}s infinite alternate`}}/>)}

// ── Radar chart ────────────────────────────────────────────────────
function PDARadar({pda,axes}){
  const data=Object.keys(axes).map(k=>({axis:axes[k],value:pda[k]||0}));
  return(
    <ResponsiveContainer width="100%" height={200}>
      <RadarChart data={data} margin={{top:10,right:26,bottom:10,left:26}}>
        <PolarGrid stroke={BD} strokeDasharray="3 3"/>
        <PolarAngleAxis dataKey="axis" tick={{fill:MT,fontSize:10,fontFamily:"'IBM Plex Mono',monospace"}}/>
        <Radar dataKey="value" stroke={G} fill={G} fillOpacity={0.12} strokeWidth={1.5} dot={{fill:G,r:2.5}}/>
        <Tooltip contentStyle={{background:CD,border:`1px solid ${BD}`,borderRadius:6,fontSize:11,color:TX,fontFamily:"'IBM Plex Mono',monospace"}} formatter={v=>[`${v} / 100`]}/>
      </RadarChart>
    </ResponsiveContainer>
  );
}

function PDABars({pda,axes}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {Object.keys(AX).map(k=>(
        <div key={k}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
            <span style={{fontSize:11,color:MT,fontFamily:"'IBM Plex Mono',monospace"}}>{axes[k]}</span>
            <span style={{fontSize:13,fontWeight:600,color:AX[k],fontFamily:"'IBM Plex Mono',monospace"}}>{pda[k]||0}</span>
          </div>
          <div style={{height:3,background:BD,borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pda[k]||0}%`,background:`linear-gradient(90deg,${AX[k]},${AXL[k]})`,borderRadius:2,transition:"width .8s ease"}}/>
          </div>
        </div>
      ))}
    </div>
  );
}

function DKProfileTest({lang,t}){
  const [step,setStep]=useState("intro");
  const [name,setName]=useState("");
  const [current,setCurrent]=useState(0);
  const [answers,setAnswers]=useState({});
  const [result,setResult]=useState(null);
  const [loading,setLoading]=useState(false);
  const q=QUESTIONS[current];
  const scale=SCALE[lang]||SCALE.en;
  const total=QUESTIONS.length;

  const computeScores=()=>{
    const axes={D:[],E:[],P:[],N:[],A:[]};
    QUESTIONS.forEach(q=>{if(answers[q.id])axes[q.axis].push(answers[q.id]);});
    const s={};
    Object.keys(axes).forEach(k=>{const v=axes[k];s[k]=v.length?Math.round((v.reduce((a,b)=>a+b,0)/(v.length*5))*100):0;});
    return s;
  };

  const analyze=()=>{
    const scores=computeScores();
    setLoading(true);
    setTimeout(()=>{
      const interp=mockClaude("profile",{scores});
      setResult({scores,interp});
      setStep("result");
      setLoading(false);
    },1800);
  };

  const handleAnswer=(val)=>{
    setAnswers({...answers,[q.id]:val});
    if(current<total-1)setTimeout(()=>setCurrent(c=>c+1),280);
  };

  const card={background:CD,border:`1px solid ${BD}`,borderRadius:10,padding:"24px 28px",marginBottom:14};
  const lbl={fontSize:10,fontWeight:600,color:MT,letterSpacing:"0.12em",textTransform:"uppercase",fontFamily:"'IBM Plex Mono',monospace",display:"block",marginBottom:8};
  const inp={width:"100%",background:SF,border:`1px solid ${BD}`,borderRadius:6,padding:"12px 14px",color:TX,fontSize:14,fontFamily:"'IBM Plex Sans',sans-serif",outline:"none",boxSizing:"border-box"};
  const btn={padding:"12px 28px",borderRadius:6,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,background:`linear-gradient(135deg,${G},${GL})`,color:"#06070d",fontFamily:"'IBM Plex Sans',sans-serif"};
  const btnG={padding:"10px 18px",borderRadius:6,border:`1px solid ${BD}`,background:"transparent",color:MT,cursor:"pointer",fontSize:12,fontFamily:"'IBM Plex Sans',sans-serif"};

  if(step==="intro")return(
    <div style={{maxWidth:560,margin:"0 auto"}}>
      <div style={card}>
        <div style={{fontSize:22,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:TX,marginBottom:6}}>{t.testTitle}</div>
        <div style={{fontSize:13,color:MT,lineHeight:1.8,marginBottom:24}}>{t.testDesc}</div>
        <label style={lbl}>{t.testName}</label>
        <input style={inp} placeholder={t.testNamePh} value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&name.trim()&&setStep("test")}/>
        <div style={{marginTop:18}}><button style={{...btn,opacity:name.trim()?1:.45}} onClick={()=>name.trim()&&setStep("test")}>{t.testStart}</button></div>
      </div>
      <div style={{padding:"12px 16px",borderRadius:6,background:SF,border:`1px solid ${BD}`,fontSize:11,color:MT,lineHeight:1.7,fontStyle:"italic"}}>⚠ {t.disclaimer}</div>
    </div>
  );

  if(step==="test")return(
    <div style={{maxWidth:600,margin:"0 auto"}}>
      <div style={{marginBottom:24}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
          <span style={{fontSize:11,color:MT,fontFamily:"'IBM Plex Mono',monospace"}}>{t.question} {current+1} {t.of} {total}</span>
          <span style={{fontSize:11,color:G,fontFamily:"'IBM Plex Mono',monospace",fontWeight:600}}>{Math.round((current/total)*100)}%</span>
        </div>
        <div style={{height:2,background:BD,borderRadius:1}}>
          <div style={{height:"100%",width:`${((current+1)/total)*100}%`,background:`linear-gradient(90deg,${G},${GL})`,borderRadius:1,transition:"width .35s ease"}}/>
        </div>
      </div>
      <div style={{marginBottom:12}}>
        <span style={{fontSize:10,fontWeight:600,color:AX[q.axis],fontFamily:"'IBM Plex Mono',monospace",letterSpacing:"0.1em",textTransform:"uppercase",padding:"3px 10px",borderRadius:20,background:`${AX[q.axis]}18`,border:`1px solid ${AX[q.axis]}40`}}>{t.axes[q.axis]}</span>
      </div>
      <div style={{...card,minHeight:110,display:"flex",alignItems:"center",borderColor:answers[q.id]?`${G}40`:BD}}>
        <div style={{fontSize:17,lineHeight:1.75,color:TX}}>{q[lang]||q.en}</div>
      </div>
      <div style={{marginBottom:24}}>
        <div style={{fontSize:10,color:"#2e3048",fontFamily:"'IBM Plex Mono',monospace",textAlign:"center",marginBottom:14,letterSpacing:"0.08em",textTransform:"uppercase"}}>{t.testInstructions}</div>
        <div style={{display:"flex",gap:8,justifyContent:"center"}}>
          {[1,2,3,4,5].map(val=>{
            const active=answers[q.id]===val;
            return(
              <button key={val} onClick={()=>handleAnswer(val)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:7,padding:"14px 8px",borderRadius:8,border:`1px solid ${active?G:BD}`,background:active?`${G}18`:SF,cursor:"pointer",minWidth:60,transition:"all .15s",flex:1}}>
                <span style={{fontSize:22,fontWeight:700,color:active?G:MT,fontFamily:"'IBM Plex Mono',monospace",lineHeight:1}}>{val}</span>
                <span style={{fontSize:9,color:active?G:"#2e3048",textAlign:"center",fontFamily:"'IBM Plex Mono',monospace",letterSpacing:"0.04em",textTransform:"uppercase",lineHeight:1.3}}>{scale[val-1]}</span>
              </button>
            );
          })}
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between"}}>
        <button style={btnG} onClick={()=>setCurrent(c=>Math.max(0,c-1))} disabled={current===0}>{t.testPrev}</button>
        {current<total-1
          ?<button style={{...btn,opacity:answers[q.id]?1:.4}} onClick={()=>answers[q.id]&&setCurrent(c=>c+1)}>{t.testNext}</button>
          :<button style={{...btn,opacity:Object.keys(answers).length===total?1:.4}} onClick={()=>Object.keys(answers).length===total&&analyze()}>{t.testFinish}</button>
        }
      </div>
    </div>
  );

  if(loading)return(<div style={{textAlign:"center",padding:"80px 0"}}><Spinner/><div style={{fontSize:13,color:MT,fontFamily:"'IBM Plex Mono',monospace",marginTop:12}}>{t.testAnalyzing}</div></div>);

  if(step==="result"&&result){
    const {scores,interp}=result;
    return(
      <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24}}>
          <div>
            <div style={{fontSize:11,color:MT,fontFamily:"'IBM Plex Mono',monospace",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>{t.testResults}</div>
            <div style={{fontSize:26,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:TX}}>{name}</div>
            {interp.profileType&&<div style={{fontSize:13,color:G,fontFamily:"'IBM Plex Mono',monospace",marginTop:4}}>{interp.profileType}</div>}
          </div>
          <button style={{padding:"8px 16px",borderRadius:6,border:`1px solid ${BD}`,background:"transparent",color:MT,cursor:"pointer",fontSize:11,fontFamily:"'IBM Plex Mono',monospace"}} onClick={()=>{setStep("intro");setAnswers({});setCurrent(0);setResult(null);setName("");}}>{t.testRestart}</button>
        </div>
        <div style={{background:CD,border:`1px solid ${BD}`,borderRadius:10,padding:"24px 28px",marginBottom:14}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24,alignItems:"center"}}>
            <PDARadar pda={scores} axes={t.axes}/>
            <PDABars pda={scores} axes={t.axes}/>
          </div>
        </div>
        {interp.summary&&<div style={{background:CD,border:`1px solid ${BD}`,borderRadius:10,padding:"24px 28px",marginBottom:14}}><div style={{fontSize:14,color:TX,lineHeight:1.85,marginBottom:14}}>{interp.summary}</div>{interp.workStyle&&<div style={{fontSize:13,color:MT,lineHeight:1.75,paddingTop:14,borderTop:`1px solid ${BD}`}}>{interp.workStyle}</div>}</div>}
        {(interp.strengths?.length>0||interp.challenges?.length>0)&&(
          <div style={{background:CD,border:`1px solid ${BD}`,borderRadius:10,padding:"24px 28px",marginBottom:14}}>
            {interp.strengths?.length>0&&<div style={{marginBottom:12}}><span style={{fontSize:9,fontWeight:600,color:"#6aad8e",marginRight:10,textTransform:"uppercase",letterSpacing:"0.1em",fontFamily:"'IBM Plex Mono',monospace"}}>{t.str}</span>{interp.strengths.map((x,i)=><span key={i} style={{display:"inline-block",padding:"3px 9px",borderRadius:20,fontSize:11,margin:"2px",background:`${SU}18`,color:"#6aad8e",border:`1px solid ${SU}40`}}>{x}</span>)}</div>}
            {interp.challenges?.length>0&&<div><span style={{fontSize:9,fontWeight:600,color:"#ad6a6a",marginRight:10,textTransform:"uppercase",letterSpacing:"0.1em",fontFamily:"'IBM Plex Mono',monospace"}}>{t.gap}</span>{interp.challenges.map((x,i)=><span key={i} style={{display:"inline-block",padding:"3px 9px",borderRadius:20,fontSize:11,margin:"2px",background:`${DA}18`,color:"#ad6a6a",border:`1px solid ${DA}40`}}>{x}</span>)}</div>}
          </div>
        )}
        <div style={{padding:"12px 16px",borderRadius:6,background:SF,border:`1px solid ${BD}`,fontSize:11,color:MT,lineHeight:1.7,fontStyle:"italic"}}>⚠ {t.disclaimer}</div>
      </div>
    );
  }
  return null;
}

// ── Main App ───────────────────────────────────────────────────────

  const [jobDesc,setJobDesc]=useState("");
  const [cvs,setCvs]=useState(["",""]);
  const [cvResults,setCvResults]=useState(null);
  const [cvLoading,setCvLoading]=useState(false);

  const [docType,setDocType]=useState(0);
  const [docDetails,setDocDetails]=useState("");
  const [docResult,setDocResult]=useState(null);
  const [docLoading,setDocLoading]=useState(false);
  const [copied,setCopied]=useState(false);

  const [context,setContext]=useState("");
  const [botActive,setBotActive]=useState(false);
  const [messages,setMessages]=useState([]);
  const [chatInput,setChatInput]=useState("");
  const [botLoading,setBotLoading]=useState(false);
  const chatEnd=useRef(null);
  useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:"smooth"});},[messages]);

  const analyzeCVs=()=>{
    const filled=cvs.filter(c=>c.trim());
    if(!jobDesc.trim()||!filled.length)return;
    setCvLoading(true);setCvResults(null);
    setTimeout(()=>{setCvResults(mockClaude("cv",{count:filled.length}));setCvLoading(false);},2000);
  };

  const generateDoc=()=>{
    if(!docDetails.trim())return;
    setDocLoading(true);setDocResult(null);
    setTimeout(()=>{setDocResult(mockClaude("doc",{}));setDocLoading(false);},1500);
  };

  const activateBot=()=>{
    if(!context.trim())return;
    setBotActive(true);
    setMessages([{role:"assistant",content:t.welcome}]);
  };

  const sendChat=()=>{
    if(!chatInput.trim()||!botActive)return;
    const userMsg={role:"user",content:chatInput};
    const next=[...messages,userMsg];
    setMessages(next);setChatInput("");setBotLoading(true);

  };

          <div style={{width:1,height:20,background:BD}}/>
          <div>
            <div style={{fontSize:22,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:G,letterSpacing:"0.18em"}}>DKHR</div>
            <div style={{fontSize:9,color:MT,fontFamily:"'IBM Plex Mono',monospace",letterSpacing:"0.14em",textTransform:"uppercase"}}>HR Intelligence</div>
          </div>
        </div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {["es","en","pt"].map(l=><button key={l} style={S.langBtn(lang===l)} onClick={()=>setLang(l)}>{l.toUpperCase()}</button>)}
        </div>
      </header>

      <div style={{background:"#a0684815",borderBottom:`1px solid #a0684830`,padding:"7px 24px",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontSize:10,color:"#c48a6a",fontFamily:"'IBM Plex Mono',monospace",letterSpacing:"0.08em"}}>⚡ MODO DEMO — Respuestas de muestra. Activá la API key para usar IA real.</span>
      </div>

      <main style={{maxWidth:900,margin:"0 auto",padding:"36px clamp(16px,4vw,24px)"}}>
        <div style={{display:"flex",background:CD,borderRadius:8,padding:"3px",border:`1px solid ${BD}`,marginBottom:32,gap:"2px",overflowX:"auto"}}>
          {(t.tabs||["CVs","Documentos","Onboarding","DK Profile"]).map((tb,i)=>(
            <button key={i} style={S.tab(tab===i)} onClick={()=>setTab(i)}>{tb}</button>
          ))}
        </div>

        {/* CVs */}
        {tab===0&&(
          <div>
            <div style={S.card}>
              <label style={S.lbl}>{t.jdl}</label>
              <textarea rows={4} style={S.inp} placeholder={t.jdph} value={jobDesc} onChange={e=>setJobDesc(e.target.value)}/>
            </div>
            <div style={S.card}>
              <label style={S.lbl}>{t.cvsl}</label>
              {cvs.map((cv,i)=>(
                <div key={i} style={{display:"flex",gap:10,marginBottom:10,alignItems:"flex-start"}}>
                  <div style={{width:24,height:24,borderRadius:"50%",background:GD,border:`1px solid ${G}40`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:600,color:G,flexShrink:0,marginTop:12,fontFamily:"'IBM Plex Mono',monospace"}}>{i+1}</div>
                  <textarea rows={3} style={{...S.inp,flex:1}} placeholder={t.cvph(i+1)} value={cv} onChange={e=>{const n=[...cvs];n[i]=e.target.value;setCvs(n)}}/>
                  {cvs.length>1&&<button style={S.btnG} onClick={()=>setCvs(cvs.filter((_,j)=>j!==i))}>×</button>}
                </div>
              ))}
              {cvs.length<5&&<button style={{...S.btnG,color:G,borderColor:`${G}40`}} onClick={()=>setCvs([...cvs,""])}>{t.addcv}</button>}
            </div>
            <button style={S.btn} onClick={analyzeCVs} disabled={cvLoading}>{cvLoading?t.anzl:t.anzbtn}</button>
            {cvLoading&&<div style={{marginTop:16}}><Spinner/></div>}
            {cvResults&&(
              <div style={{marginTop:24}}>
                {cvResults.map((c,i)=>(
                  <div key={i} style={{background:CD,border:`1px solid ${c.rank===1?`${G}50`:BD}`,borderRadius:10,padding:"24px 28px",marginBottom:14}}>
                    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                      <div style={{width:30,height:30,borderRadius:"50%",display:"inline-flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:12,fontFamily:"'IBM Plex Mono',monospace",background:c.rank===1?`linear-gradient(135deg,${G},${GL})`:c.rank===2?"#1e2238":"#1a1810",color:c.rank===1?"#06070d":c.rank===2?"#8090b0":"#8a6840",flexShrink:0}}>#{c.rank}</div>
                      <div style={{fontWeight:600,fontSize:15,flex:1}}>{c.candidate}</div>
                      <div style={{display:"inline-flex",alignItems:"baseline",gap:4,padding:"4px 12px",borderRadius:4,background:GD,border:`1px solid ${G}40`}}>
                        <span style={{fontSize:18,fontWeight:700,color:G,fontFamily:"'IBM Plex Mono',monospace"}}>{c.score}</span>
                        <span style={{fontSize:10,color:MT,fontFamily:"'IBM Plex Mono',monospace"}}>/100</span>
                      </div>
                    </div>
                    <div style={{fontSize:13,color:MT,lineHeight:1.8,marginBottom:12}}>{c.summary}</div>
                    {c.strengths?.length>0&&<div style={{marginBottom:8}}><span style={{fontSize:9,fontWeight:600,color:"#6aad8e",marginRight:8,textTransform:"uppercase",letterSpacing:"0.1em",fontFamily:"'IBM Plex Mono',monospace"}}>{t.str}</span>{c.strengths.map((x,j)=><span key={j} style={S.tag("g")}>{x}</span>)}</div>}
                    {c.gaps?.length>0&&<div style={{marginBottom:14}}><span style={{fontSize:9,fontWeight:600,color:"#ad6a6a",marginRight:8,textTransform:"uppercase",letterSpacing:"0.1em",fontFamily:"'IBM Plex Mono',monospace"}}>{t.gap}</span>{c.gaps.map((x,j)=><span key={j} style={S.tag("r")}>{x}</span>)}</div>}
                    {c.pda&&(
                      <div style={{borderTop:`1px solid ${BD}`,paddingTop:16}}>
                        <div style={{fontSize:10,fontWeight:600,color:G,letterSpacing:"0.12em",textTransform:"uppercase",fontFamily:"'IBM Plex Mono',monospace",marginBottom:12}}>{t.profile}</div>
                        {c.pdaProfile&&<div style={{fontSize:12,color:MT,marginBottom:14,lineHeight:1.7,fontStyle:"italic"}}>{c.pdaProfile}</div>}
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,alignItems:"center"}}>
                          <PDARadar pda={c.pda} axes={t.axes}/>
                          <PDABars pda={c.pda} axes={t.axes}/>
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* Documentos */}
        {tab===1&&(
          <div>
            <div style={S.card}>
              <label style={S.lbl}>{t.dtl}</label>
              <select style={S.sel} value={docType} onChange={e=>{setDocType(Number(e.target.value));setDocResult(null);}}>
                {(t.dts||[]).map((d,i)=><option key={i} value={i}>{d}</option>)}
              </select>
            </div>
            <div style={S.card}>
              <label style={S.lbl}>{t.detl}</label>
              <textarea rows={5} style={S.inp} placeholder={t.detph} value={docDetails} onChange={e=>setDocDetails(e.target.value)}/>
            </div>
            <button style={S.btn} onClick={generateDoc} disabled={docLoading}>{docLoading?t.genl:t.genbtn}</button>
            {docLoading&&<div style={{marginTop:16}}><Spinner/></div>}
            {docResult&&(
              <div style={{marginTop:20}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <span style={{fontSize:11,fontFamily:"'IBM Plex Mono',monospace",color:G}}>{(t.dts||[])[docType]?.toUpperCase()}</span>
                  <button style={S.btnG} onClick={()=>{navigator.clipboard.writeText(docResult);setCopied(true);setTimeout(()=>setCopied(false),2000);}}>{copied?t.copied:t.copy}</button>
                </div>
                <div style={{background:SF,border:`1px solid ${BD}`,borderRadius:8,padding:20,whiteSpace:"pre-wrap",fontSize:13,lineHeight:1.85,color:TX,maxHeight:400,overflow:"auto",fontFamily:"'IBM Plex Mono',monospace"}}>{docResult}</div>
              </div>
            )}
          </div>
        )}

        {/* Onboarding */}
        {tab===2&&(
          <div>
            <div style={S.card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <label style={{...S.lbl,marginBottom:0}}>{t.ctxl}</label>
                <div style={{display:"inline-flex",alignItems:"center",gap:6,padding:"3px 10px",borderRadius:20,background:botActive?`${SU}18`:`${DA}18`,color:botActive?"#6aad8e":"#ad6a6a",fontSize:10,fontWeight:600,fontFamily:"'IBM Plex Mono',monospace",border:`1px solid ${botActive?`${SU}40`:`${DA}40`}`}}>● {botActive?t.bon:t.boff}</div>
              </div>
              <textarea rows={4} style={S.inp} placeholder={t.ctxph} value={context} onChange={e=>{setContext(e.target.value);if(botActive)setBotActive(false);}}/>
              <div style={{marginTop:12}}><button style={S.btn} onClick={activateBot}>{t.actbtn}</button></div>
            </div>
            <div style={{background:SF,border:`1px solid ${BD}`,borderRadius:10,height:300,overflowY:"auto",padding:16,marginBottom:10}}>
              {!botActive&&messages.length===0&&<div style={{textAlign:"center",color:"#2e3048",fontSize:12,marginTop:110,fontFamily:"'IBM Plex Mono',monospace"}}>{t.chatph}</div>}
              {messages.map((m,i)=>(
                <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:10}}>
                  <div style={{maxWidth:"75%",padding:"10px 14px",borderRadius:m.role==="user"?"10px 10px 3px 10px":"10px 10px 10px 3px",background:m.role==="user"?G:CD,color:m.role==="user"?"#06070d":TX,fontSize:13,lineHeight:1.65,border:`1px solid ${m.role==="user"?"transparent":BD}`}}>{m.content}</div>
                </div>
              ))}
              {botLoading&&<div style={{display:"flex",justifyContent:"flex-start",marginBottom:10}}><div style={{padding:"12px 16px",borderRadius:"10px 10px 10px 3px",background:CD,border:`1px solid ${BD}`}}><Spinner/></div></div>}
              <div ref={chatEnd}/>
            </div>
            <div style={{display:"flex",gap:10}}>
              <input type="text" style={{...S.inp,flex:1,resize:"none"}} placeholder={t.chinph} value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendChat()} disabled={!botActive}/>
              <button style={{...S.btn,flexShrink:0,opacity:botActive?1:.4}} onClick={sendChat} disabled={!botActive||botLoading}>{t.sndbtn}</button>
            </div>
          </div>
        )}

        {/* DK Profile */}
        {tab===3&&<DKProfileTest lang={lang} t={t}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
