<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DKHR — Human Resources Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#07080f;color:#dde1ef;font-family:'IBM Plex Sans',sans-serif;-webkit-font-smoothing:antialiased}
@keyframes spin{from{opacity:.25;transform:scale(.7)}to{opacity:1;transform:scale(1.1)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 #00e5c830}50%{box-shadow:0 0 0 8px #00e5c800}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#0c0d18}
::-webkit-scrollbar-thumb{background:#181a27;border-radius:2px}
textarea:focus,input:focus,select:focus{border-color:#00e5c8!important;outline:none!important;box-shadow:0 0 0 2px #00e5c815!important}
button{transition:opacity .15s,transform .1s}
button:hover:not(:disabled){opacity:.85}
button:active:not(:disabled){transform:scale(.98)}
button:disabled{opacity:.4;cursor:not-allowed}
.fade{animation:fadeIn .3s ease both}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#525870;font-family:IBM Plex Mono,monospace;font-size:12px;letter-spacing:.1em">CARGANDO DKHR...</div></div>
<script type="text/babel">

const G="#00e5c8",GL="#00c4ab",BG="#07080f",SF="#0c0d18",CD="#10111c",BD="#181a27",TX="#dde1ef",MT="#525870",DM="#2e3048";
const AX={D:"#00e5c8",E:"#5b8ab0",P:"#7c6fbc",N:"#4d8a6c",A:"#a06848"};
const AXL={D:"#00c4ab",E:"#7aadd4",P:"#9d94e0",N:"#6aad8e",A:"#c48a6a"};
const SU="#3d7a5c",DA="#7a3d3d";

// ── Radar SVG (no deps) ────────────────────────────────────────────
function RadarSVG({data, axes}) {
  const size = 180, cx = size/2, cy = size/2, r = 70;
  const keys = Object.keys(axes);
  const n = keys.length;
  const angle = i => (i * 2 * Math.PI / n) - Math.PI/2;
  const pt = (i, val) => {
    const a = angle(i), dist = (val/100)*r;
    return [cx + dist*Math.cos(a), cy + dist*Math.sin(a)];
  };
  const gridPts = (scale) => keys.map((_,i) => pt(i, scale*100)).map(p=>p.join(",")).join(" ");
  const dataPts = keys.map((k,i) => pt(i, data[k]||0)).map(p=>p.join(",")).join(" ");
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {[20,40,60,80,100].map(s=>(
        <polygon key={s} points={gridPts(s/100)} fill="none" stroke={BD} strokeWidth="1" strokeDasharray="2,2"/>
      ))}
      {keys.map((_,i)=>{
        const [x,y]=pt(i,100);
        return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke={BD} strokeWidth="1"/>;
      })}
      <polygon points={dataPts} fill={G+"20"} stroke={G} strokeWidth="1.5"/>
      {keys.map((k,i)=>{
        const [x,y]=pt(i,data[k]||0);
        return <circle key={i} cx={x} cy={y} r="3" fill={G}/>;
      })}
      {keys.map((k,i)=>{
        const [x,y]=pt(i,115);
        return <text key={i} x={x} y={y} textAnchor="middle" dominantBaseline="middle" fill={MT} fontSize="9" fontFamily="IBM Plex Mono,monospace">{axes[k]}</text>;
      })}
    </svg>
  );
}

function Bars({pda, axes}) {
  return (
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {Object.keys(AX).map(k=>(
        <div key={k}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{fontSize:10,color:MT,fontFamily:"IBM Plex Mono,monospace"}}>{axes[k]}</span>
            <span style={{fontSize:12,fontWeight:600,color:AX[k],fontFamily:"IBM Plex Mono,monospace"}}>{pda[k]||0}</span>
          </div>
          <div style={{height:3,background:BD,borderRadius:2}}>
            <div style={{height:"100%",width:(pda[k]||0)+"%",background:"linear-gradient(90deg,"+AX[k]+","+AXL[k]+")",borderRadius:2,transition:"width .8s ease"}}/>
          </div>
        </div>
      ))}
    </div>
  );
}

function Spinner() {
  return (
    <div style={{display:"flex",gap:5,justifyContent:"center",padding:"8px 0"}}>
      {[0,1,2].map(i=><span key={i} style={{width:5,height:5,borderRadius:"50%",background:G,display:"inline-block",animation:`spin .9s ease ${i*.15}s infinite alternate`}}/>)}
    </div>
  );
}

// ── Mock data ──────────────────────────────────────────────────────
function getMock(type, payload) {
  if(type==="cv") {
    const names=["Ana García","Carlos Mendez","Laura Ríos","Diego Torres","Sofía Ruiz"];
    const n=Math.min(payload||2,5);
    return Array.from({length:n},(_,i)=>({
      rank:i+1, candidate:names[i],
      score:Math.round(92-i*10),
      summary:i===0?"Perfil sólido con experiencia directamente alineada. Demuestra liderazgo y orientación a resultados medibles.":i===1?"Candidato con buena base técnica y actitud proactiva. Requiere desarrollo en gestión de equipos.":"Perfil en desarrollo con potencial. Requiere acompañamiento inicial.",
      strengths:i===0?["Liderazgo probado","Orientación a resultados","Comunicación efectiva"]:i===1?["Proactividad","Aprendizaje rápido"]:["Detalle y precisión"],
      gaps:i===0?["Experiencia internacional"]:i===1?["Gestión de equipos","Visión estratégica"]:["Autonomía","Toma de decisiones"],
      pda:{D:78-i*12,E:65-i*5,P:55+i*10,N:72-i*4,A:80-i*8},
      pdaProfile:i===0?"Perfil orientado a resultados con alta capacidad de influencia.":i===1?"Perfil colaborativo con tendencia analítica.":"Perfil normativo y paciente."
    }));
  }
  if(type==="doc") {
    const d=new Date().toLocaleDateString("es-AR",{year:"numeric",month:"long",day:"numeric"});
    return "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\nDOCUMENTO RECURSOS HUMANOS  [DEMO]\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\nBuenos Aires, "+d+"\n\nEstimado/a [Nombre]:\n\nNos complace comunicarle los términos acordados\npara su incorporación a la organización.\n\nPOSICIÓN    : [Cargo]\nÁREA        : [Departamento]\nFECHA INICIO: [DD/MM/AAAA]\nREMUNERACIÓN: $ [Monto] bruto mensual\nMODALIDAD   : [Presencial · Híbrida · Remota]\n\nCondiciones sujetas a Ley 20.744.\n\nCordialmente,\nRecursos Humanos — DKHR\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n⚠ Documento de demostración.";
  }
  if(type==="chat") {
    const r=["Según las políticas de la empresa, podés encontrar esa información en el manual de bienvenida.","De acuerdo al reglamento, ese tipo de solicitudes deben realizarse con 5 días hábiles de anticipación.","Lo indicado es coordinar con tu líder directo y luego notificar a RRHH.","Ese beneficio aplica a partir del tercer mes de antigüedad."];
    return r[Math.floor(Math.random()*r.length)];
  }
  if(type==="profile") {
    const s=payload||{};
    let pt="Analista Estratégico";
    if((s.D||0)>70&&(s.E||0)>65)pt="Líder Influyente";
    else if((s.D||0)>70)pt="Ejecutor Directo";
    else if((s.E||0)>70)pt="Conector Social";
    else if((s.N||0)>75)pt="Especialista Metódico";
    return {profileType:pt,summary:"Este perfil combina orientación a resultados con capacidad de influencia interpersonal. Toma decisiones con seguridad y mantiene el foco en los objetivos sin perder de vista el equipo.",strengths:["Pensamiento estratégico","Resiliencia","Capacidad de influencia"],challenges:["Puede subestimar detalles operativos","Tendencia a avanzar antes de consensuar"],workStyle:"Rinde mejor en entornos desafiantes con autonomía y métricas claras."};
  }
}

// ── Questions ──────────────────────────────────────────────────────
const QS=[
  {id:1,ax:"D",es:"Me siento cómodo/a tomando decisiones rápidas, incluso con información incompleta.",en:"I feel comfortable making quick decisions, even with incomplete information."},
  {id:2,ax:"D",es:"Cuando hay un obstáculo, mi primer impulso es enfrentarlo directamente.",en:"When there's an obstacle, my first impulse is to face it head-on."},
  {id:3,ax:"D",es:"Prefiero liderar un proyecto antes que seguir las instrucciones de otro.",en:"I prefer to lead a project rather than follow someone else's instructions."},
  {id:4,ax:"D",es:"Me incomoda esperar la aprobación de otros para actuar.",en:"I feel uncomfortable waiting for others' approval before acting."},
  {id:5,ax:"D",es:"Asumo riesgos calculados con naturalidad cuando creo en algo.",en:"I naturally take calculated risks when I believe in something."},
  {id:6,ax:"E",es:"Disfruto conocer gente nueva y hacer contactos en entornos profesionales.",en:"I enjoy meeting new people and networking in professional settings."},
  {id:7,ax:"E",es:"Me resulta fácil hablar en público o ante grupos grandes.",en:"I find it easy to speak in public or in front of large groups."},
  {id:8,ax:"E",es:"Genero entusiasmo en los equipos con los que trabajo.",en:"I generate enthusiasm in the teams I work with."},
  {id:9,ax:"E",es:"Prefiero resolver problemas hablando con otros antes que pensar solo/a.",en:"I prefer to solve problems by talking with others rather than thinking alone."},
  {id:10,ax:"E",es:"Las reuniones sociales me dan energía en lugar de agotarme.",en:"Social gatherings energize me rather than drain me."},
  {id:11,ax:"P",es:"Prefiero un entorno de trabajo estable y predecible antes que uno dinámico.",en:"I prefer a stable and predictable work environment over a dynamic one."},
  {id:12,ax:"P",es:"Soy constante en mis tareas y rara vez dejo proyectos a medias.",en:"I am consistent in my tasks and rarely leave projects unfinished."},
  {id:13,ax:"P",es:"Apoyo a mis compañeros con paciencia incluso cuando cometen errores.",en:"I support my colleagues patiently even when they make mistakes."},
  {id:14,ax:"P",es:"Me tomo el tiempo necesario para pensar antes de responder o actuar.",en:"I take the necessary time to think before responding or acting."},
  {id:15,ax:"P",es:"El bienestar del equipo es tan importante para mí como alcanzar los resultados.",en:"Team wellbeing is as important to me as achieving results."},
  {id:16,ax:"N",es:"Sigo los procedimientos establecidos incluso cuando creo que hay una forma más rápida.",en:"I follow established procedures even when I think there's a faster way."},
  {id:17,ax:"N",es:"Me incomoda entregar un trabajo si no cumple con los estándares de calidad.",en:"I feel uncomfortable delivering work that doesn't meet quality standards."},
  {id:18,ax:"N",es:"Presto mucha atención a los detalles, incluso en tareas menores.",en:"I pay close attention to details, even in minor tasks."},
  {id:19,ax:"N",es:"Las reglas y normas me dan claridad y seguridad para trabajar mejor.",en:"Rules and norms give me clarity and security to work better."},
  {id:20,ax:"N",es:"Analizo en profundidad antes de tomar una decisión importante.",en:"I analyze in depth before making an important decision."},
  {id:21,ax:"A",es:"Mantengo la calma en situaciones de alta presión o conflicto.",en:"I stay calm in high-pressure or conflict situations."},
  {id:22,ax:"A",es:"Puedo adaptar mi estilo de comunicación según la persona con quien hablo.",en:"I can adapt my communication style depending on who I'm talking to."},
  {id:23,ax:"A",es:"Cuando algo no sale como esperaba, me recupero rápidamente y sigo adelante.",en:"When something doesn't go as expected, I recover quickly and move forward."},
  {id:24,ax:"A",es:"Puedo trabajar eficientemente con personas de estilos muy distintos al mío.",en:"I can work efficiently with people of very different styles from my own."},
  {id:25,ax:"A",es:"Gestiono mis emociones de manera que no afecten negativamente mi trabajo.",en:"I manage my emotions so they don't negatively affect my work."},
];

const SCALE_ES=["Nada","Poco","Moderadamente","Bastante","Totalmente"];
const SCALE_EN=["Not at all","A little","Moderately","Quite a lot","Completely"];
const AXES_ES={D:"Dominancia",E:"Extroversión",P:"Paciencia",N:"Normatividad",A:"Autocontrol"};
const AXES_EN={D:"Dominance",E:"Extroversion",P:"Patience",N:"Normativity",A:"Self-control"};

// ── Common styles ──────────────────────────────────────────────────
const card={background:CD,border:"1px solid "+BD,borderRadius:10,padding:"24px 28px",marginBottom:14};
const lbl={fontSize:10,fontWeight:600,color:MT,letterSpacing:"0.12em",textTransform:"uppercase",fontFamily:"IBM Plex Mono,monospace",display:"block",marginBottom:8};
const inp={width:"100%",background:SF,border:"1px solid "+BD,borderRadius:6,padding:"12px 14px",color:TX,fontSize:13,fontFamily:"IBM Plex Sans,sans-serif",resize:"vertical",outline:"none",boxSizing:"border-box"};
const primaryBtn={padding:"11px 24px",borderRadius:6,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,background:"linear-gradient(135deg,"+G+","+GL+")",color:"#06070d",fontFamily:"IBM Plex Sans,sans-serif"};
const ghostBtn={padding:"8px 14px",borderRadius:6,border:"1px solid "+BD,background:"transparent",color:MT,cursor:"pointer",fontSize:11,fontFamily:"IBM Plex Mono,monospace"};

// ── DK Profile Test ────────────────────────────────────────────────
function DKTest({lang}) {
  const [step,setStep]=React.useState("intro");
  const [name,setName]=React.useState("");
  const [cur,setCur]=React.useState(0);
  const [ans,setAns]=React.useState({});
  const [result,setResult]=React.useState(null);
  const [loading,setLoading]=React.useState(false);
  const q=QS[cur];
  const scale=lang==="en"?SCALE_EN:SCALE_ES;
  const axes=lang==="en"?AXES_EN:AXES_ES;
  const disc=lang==="en"?"DK Profile generates a behavioral approximation via AI analysis. It does not replace formal psychometric assessments.":"DK Profile genera una aproximación conductual mediante IA. No reemplaza evaluaciones psicométricas formales.";

  const computeScores=()=>{
    const ax={D:[],E:[],P:[],N:[],A:[]};
    QS.forEach(q=>{if(ans[q.id])ax[q.ax].push(ans[q.id]);});
    const s={};
    Object.keys(ax).forEach(k=>{const v=ax[k];s[k]=v.length?Math.round((v.reduce((a,b)=>a+b,0)/(v.length*5))*100):0;});
    return s;
  };

  const analyze=()=>{
    const scores=computeScores();
    setLoading(true);
    setTimeout(()=>{setResult({scores,interp:getMock("profile",scores)});setStep("result");setLoading(false);},1800);
  };

  const pick=(val)=>{
    setAns({...ans,[q.id]:val});
    if(cur<QS.length-1)setTimeout(()=>setCur(c=>c+1),250);
  };

  if(step==="intro")return(
    <div style={{maxWidth:540,margin:"0 auto"}}>
      <div style={card}>
        <div style={{fontSize:22,fontWeight:700,fontFamily:"Cormorant Garamond,serif",color:TX,marginBottom:6}}>{lang==="en"?"DK Profile Assessment":"Evaluación DK Profile"}</div>
        <div style={{fontSize:13,color:MT,lineHeight:1.8,marginBottom:20}}>{lang==="en"?"Answer honestly — no right or wrong answers. Takes 5–7 minutes.":"Respondé con honestidad — no hay respuestas correctas. Toma 5–7 minutos."}</div>
        <label style={lbl}>{lang==="en"?"Full name":"Nombre completo"}</label>
        <input style={{...inp,resize:"none"}} placeholder={lang==="en"?"Enter your name...":"Ingresá tu nombre..."} value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&name.trim()&&setStep("test")}/>
        <div style={{marginTop:16}}><button style={{...primaryBtn,opacity:name.trim()?1:.4}} onClick={()=>name.trim()&&setStep("test")}>{lang==="en"?"Begin assessment":"Comenzar evaluación"}</button></div>
      </div>
      <div style={{padding:"12px 16px",borderRadius:6,background:SF,border:"1px solid "+BD,fontSize:11,color:MT,lineHeight:1.7,fontStyle:"italic"}}>⚠ {disc}</div>
    </div>
  );

  if(step==="test")return(
    <div style={{maxWidth:580,margin:"0 auto"}}>
      <div style={{marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
          <span style={{fontSize:11,color:MT,fontFamily:"IBM Plex Mono,monospace"}}>{lang==="en"?"Question":"Pregunta"} {cur+1} / {QS.length}</span>
          <span style={{fontSize:11,color:G,fontFamily:"IBM Plex Mono,monospace",fontWeight:600}}>{Math.round((cur/QS.length)*100)}%</span>
        </div>
        <div style={{height:2,background:BD,borderRadius:1}}>
          <div style={{height:"100%",width:((cur+1)/QS.length*100)+"%",background:"linear-gradient(90deg,"+G+","+GL+")",borderRadius:1,transition:"width .3s ease"}}/>
        </div>
      </div>
      <div style={{marginBottom:10}}>
        <span style={{fontSize:10,fontWeight:600,color:AX[q.ax],fontFamily:"IBM Plex Mono,monospace",letterSpacing:"0.1em",textTransform:"uppercase",padding:"3px 10px",borderRadius:20,background:AX[q.ax]+"18",border:"1px solid "+AX[q.ax]+"40"}}>{axes[q.ax]}</span>
      </div>
      <div style={{...card,minHeight:100,display:"flex",alignItems:"center",borderColor:ans[q.id]?G+"40":BD}}>
        <div style={{fontSize:16,lineHeight:1.75,color:TX}}>{lang==="en"?q.en:q.es}</div>
      </div>
      <div style={{marginBottom:20}}>
        <div style={{fontSize:10,color:DM,fontFamily:"IBM Plex Mono,monospace",textAlign:"center",marginBottom:12,letterSpacing:"0.08em",textTransform:"uppercase"}}>{lang==="en"?"How much do you identify with this?":"¿Cuánto te identificás con esta afirmación?"}</div>
        <div style={{display:"flex",gap:8}}>
          {[1,2,3,4,5].map(v=>{
            const active=ans[q.id]===v;
            return(
              <button key={v} onClick={()=>pick(v)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,padding:"12px 6px",borderRadius:8,border:"1px solid "+(active?G:BD),background:active?G+"18":SF,cursor:"pointer",flex:1}}>
                <span style={{fontSize:20,fontWeight:700,color:active?G:MT,fontFamily:"IBM Plex Mono,monospace"}}>{v}</span>
                <span style={{fontSize:8,color:active?G:DM,textAlign:"center",fontFamily:"IBM Plex Mono,monospace",textTransform:"uppercase",lineHeight:1.3}}>{scale[v-1]}</span>
              </button>
            );
          })}
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between"}}>
        <button style={{...ghostBtn,opacity:cur===0?.3:1}} onClick={()=>cur>0&&setCur(c=>c-1)} disabled={cur===0}>{lang==="en"?"Previous":"Anterior"}</button>
        {cur<QS.length-1
          ?<button style={{...primaryBtn,opacity:ans[q.id]?1:.4}} onClick={()=>ans[q.id]&&setCur(c=>c+1)}>{lang==="en"?"Next":"Siguiente"}</button>
          :<button style={{...primaryBtn,opacity:Object.keys(ans).length===QS.length?1:.4}} onClick={()=>Object.keys(ans).length===QS.length&&analyze()}>{lang==="en"?"Generate my profile":"Generar mi perfil"}</button>
        }
      </div>
    </div>
  );

  if(loading)return(<div style={{textAlign:"center",padding:"60px 0"}}><Spinner/><div style={{fontSize:12,color:MT,fontFamily:"IBM Plex Mono,monospace",marginTop:12,letterSpacing:"0.06em"}}>{lang==="en"?"Analyzing...":"Analizando..."}</div></div>);

  if(step==="result"&&result){
    const {scores,interp}=result;
    return(
      <div className="fade">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
          <div>
            <div style={{fontSize:10,color:MT,fontFamily:"IBM Plex Mono,monospace",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>{lang==="en"?"Your DK Profile":"Tu DK Profile"}</div>
            <div style={{fontSize:24,fontWeight:700,fontFamily:"Cormorant Garamond,serif",color:TX}}>{name}</div>
            <div style={{fontSize:12,color:G,fontFamily:"IBM Plex Mono,monospace",marginTop:3}}>{interp.profileType}</div>
          </div>
          <button style={ghostBtn} onClick={()=>{setStep("intro");setAns({});setCur(0);setResult(null);setName("");}}>{lang==="en"?"Retake":"Volver a realizar"}</button>
        </div>
        <div style={{...card}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,alignItems:"center"}}>
            <RadarSVG data={scores} axes={axes}/>
            <Bars pda={scores} axes={axes}/>
          </div>
        </div>
        <div style={{...card}}>
          <div style={{fontSize:14,color:TX,lineHeight:1.85,marginBottom:12}}>{interp.summary}</div>
          <div style={{fontSize:13,color:MT,lineHeight:1.75,paddingTop:12,borderTop:"1px solid "+BD}}>{interp.workStyle}</div>
        </div>
        <div style={{...card}}>
          <div style={{marginBottom:10}}>
            <span style={{fontSize:9,fontWeight:600,color:"#6aad8e",marginRight:8,textTransform:"uppercase",letterSpacing:"0.1em",fontFamily:"IBM Plex Mono,monospace"}}>{lang==="en"?"Strengths":"Fortalezas"}</span>
            {interp.strengths.map((x,i)=><span key={i} style={{display:"inline-block",padding:"3px 9px",borderRadius:20,fontSize:11,margin:"2px",background:SU+"18",color:"#6aad8e",border:"1px solid "+SU+"40"}}>{x}</span>)}
          </div>
          <div>
            <span style={{fontSize:9,fontWeight:600,color:"#ad6a6a",marginRight:8,textTransform:"uppercase",letterSpacing:"0.1em",fontFamily:"IBM Plex Mono,monospace"}}>{lang==="en"?"Challenges":"Desafíos"}</span>
            {interp.challenges.map((x,i)=><span key={i} style={{display:"inline-block",padding:"3px 9px",borderRadius:20,fontSize:11,margin:"2px",background:DA+"18",color:"#ad6a6a",border:"1px solid "+DA+"40"}}>{x}</span>)}
          </div>
        </div>
        <div style={{padding:"12px 16px",borderRadius:6,background:SF,border:"1px solid "+BD,fontSize:11,color:MT,fontStyle:"italic"}}>⚠ {disc}</div>
      </div>
    );
  }
  return null;
}

// ── Main App ───────────────────────────────────────────────────────
function App() {
  const [lang,setLang]=React.useState("es");
  const [tab,setTab]=React.useState(0);
  const [page,setPage]=React.useState("landing");

  // CV state
  const [jd,setJd]=React.useState("");
  const [cvs,setCvs]=React.useState(["",""]);
  const [cvRes,setCvRes]=React.useState(null);
  const [cvLoad,setCvLoad]=React.useState(false);

  // Doc state
  const [docType,setDocType]=React.useState(0);
  const [docDet,setDocDet]=React.useState("");
  const [docRes,setDocRes]=React.useState(null);
  const [docLoad,setDocLoad]=React.useState(false);
  const [copied,setCopied]=React.useState(false);

  // Bot state
  const [ctx,setCtx]=React.useState("");
  const [botOn,setBotOn]=React.useState(false);
  const [msgs,setMsgs]=React.useState([]);
  const [chatIn,setChatIn]=React.useState("");
  const [botLoad,setBotLoad]=React.useState(false);
  const chatRef=React.useRef(null);
  React.useEffect(()=>{chatRef.current&&chatRef.current.scrollIntoView({behavior:"smooth"});},[msgs]);

  const es=lang==="es";
  const en=lang==="en";
  const tabs=es?["CVs","Documentos","Onboarding","DK Profile"]:["CVs","Documents","Onboarding","DK Profile"];
  const axes=es?{D:"Dominancia",E:"Extroversión",P:"Paciencia",N:"Normatividad",A:"Autocontrol"}:{D:"Dominance",E:"Extroversion",P:"Patience",N:"Normativity",A:"Self-control"};
  const docTypes=es?["Oferta laboral","Contrato de trabajo","Carta de desvinculación","Evaluación de desempeño","Política de RRHH"]:["Job offer","Employment contract","Termination letter","Performance review","HR policy"];

  const doAnalyze=()=>{
    const filled=cvs.filter(c=>c.trim());
    if(!jd.trim()||!filled.length)return;
    setCvLoad(true);setCvRes(null);
    setTimeout(()=>{setCvRes(getMock("cv",filled.length));setCvLoad(false);},2000);
  };

  const doDoc=()=>{
    if(!docDet.trim())return;
    setDocLoad(true);setDocRes(null);
    setTimeout(()=>{setDocRes(getMock("doc"));setDocLoad(false);},1500);
  };

  const activateBot=()=>{
    if(!ctx.trim())return;
    setBotOn(true);
    const welcome=es?"Hola. Soy el asistente de onboarding DKHR. ¿En qué puedo ayudarte?":"Hello. I'm the DKHR onboarding assistant. How can I help you?";
    setMsgs([{r:"a",c:welcome}]);
  };

  const sendMsg=()=>{
    if(!chatIn.trim()||!botOn)return;
    const nm=[...msgs,{r:"u",c:chatIn}];
    setMsgs(nm);setChatIn("");setBotLoad(true);
    setTimeout(()=>{setMsgs([...nm,{r:"a",c:getMock("chat")}]);setBotLoad(false);},1200);
  };

  // ── Tab styles ─────────────────────────────────────────────────
  const tabBtn=(active)=>({flex:1,minWidth:80,padding:"10px 4px",textAlign:"center",border:"none",borderRadius:6,background:active?"linear-gradient(135deg,"+G+"25,"+G+"10)":"transparent",boxShadow:active?"inset 0 0 0 1px "+G+"55":"none",color:active?G:MT,cursor:"pointer",fontSize:11,fontWeight:active?600:400,fontFamily:"IBM Plex Sans,sans-serif",whiteSpace:"nowrap"});

  // ── Landing ─────────────────────────────────────────────────────
  if(page==="landing")return(
    <div style={{minHeight:"100vh",background:BG}}>
      {/* header */}
      <header style={{position:"fixed",top:0,left:0,right:0,zIndex:100,height:64,padding:"0 32px",display:"flex",alignItems:"center",justifyContent:"space-between",background:BG+"ee",backdropFilter:"blur(12px)",borderBottom:"1px solid "+BD}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:20,fontWeight:700,fontFamily:"Cormorant Garamond,serif",color:G,letterSpacing:"0.18em"}}>DKHR</span>
          <span style={{fontSize:9,color:MT,fontFamily:"IBM Plex Mono,monospace",letterSpacing:"0.12em",textTransform:"uppercase"}}>HR Intelligence</span>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div style={{display:"flex",gap:4}}>
            {["es","en","pt"].map(l=>(
              <button key={l} onClick={()=>setLang(l)} style={{padding:"4px 9px",border:"1px solid "+(lang===l?G:BD),borderRadius:4,background:lang===l?G+"12":"transparent",color:lang===l?G:MT,cursor:"pointer",fontSize:10,fontFamily:"IBM Plex Mono,monospace"}}>{l.toUpperCase()}</button>
            ))}
          </div>
          <button onClick={()=>setPage("app")} style={{padding:"8px 18px",borderRadius:6,border:"1px solid "+G+"50",background:G+"10",color:G,fontSize:11,fontFamily:"IBM Plex Mono,monospace",cursor:"pointer",letterSpacing:"0.06em"}}>ABRIR APP →</button>
        </div>
      </header>

      {/* hero */}
      <section style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",padding:"100px 24px 60px"}}>
        <div style={{display:"inline-flex",alignItems:"center",gap:8,padding:"4px 14px",borderRadius:20,border:"1px solid "+G+"30",background:G+"08",marginBottom:40}}>
          <span style={{width:5,height:5,borderRadius:"50%",background:G,display:"inline-block"}}/>
          <span style={{fontSize:10,color:G,fontFamily:"IBM Plex Mono,monospace",letterSpacing:"0.12em",textTransform:"uppercase"}}>AI-Powered HR Platform · Demo Mode</span>
        </div>
        <div style={{fontFamily:"Cormorant Garamond,serif",lineHeight:.88,marginBottom:28}}>
          <div style={{fontSize:"clamp(90px,16vw,180px)",fontWeight:700,color:G,letterSpacing:"-0.02em",textShadow:"0 0 80px "+G+"25"}}>DK</div>
          <div style={{fontSize:"clamp(90px,16vw,180px)",fontWeight:300,color:TX,letterSpacing:"-0.02em",marginTop:-16}}>HR</div>
        </div>
        <div style={{fontSize:11,color:MT,fontFamily:"IBM Plex Mono,monospace",letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:20}}>Human Resources Intelligence</div>
        <p style={{maxWidth:480,fontSize:15,color:TX+"90",lineHeight:1.8,marginBottom:40}}>{es?"Automatizá tu área de RRHH con inteligencia artificial. Analizá candidatos, generá documentos, habilitá onboarding 24/7 y evaluá perfiles conductuales.":"Automate your HR department with artificial intelligence. Analyze candidates, generate documents, enable 24/7 onboarding and assess behavioral profiles."}</p>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14}}>
          <button onClick={()=>setPage("app")} style={{padding:"15px 44px",borderRadius:8,background:"linear-gradient(135deg,"+G+",#00c4ab)",color:"#06070d",fontSize:14,fontWeight:700,border:"none",cursor:"pointer",fontFamily:"IBM Plex Sans,sans-serif",letterSpacing:"0.06em",boxShadow:"0 0 32px "+G+"25"}}>
            {es?"COMENZAR AHORA":"GET STARTED"}
          </button>
          <div style={{display:"flex",gap:16}}>
            {(es?["Gratis","Sin registro","5 idiomas"]:["Free","No signup","5 languages"]).map(t=>(
              <span key={t} style={{fontSize:11,color:MT,fontFamily:"IBM Plex Mono,monospace"}}>✓ {t}</span>
            ))}
          </div>
        </div>
        {/* stats */}
        <div style={{display:"flex",marginTop:64,border:"1px solid "+BD,borderRadius:10,overflow:"hidden"}}>
          {[["4",es?"Módulos":"Modules"],["5",es?"Idiomas":"Languages"],["∞",es?"Análisis":"Analyses"],["AI","Powered"]].map(([v,l],i)=>(
            <div key={i} style={{padding:"18px 32px",textAlign:"center",borderRight:i<3?"1px solid "+BD:"none",background:CD}}>
              <div style={{fontSize:26,fontWeight:700,color:G,fontFamily:"Cormorant Garamond,serif"}}>{v}</div>
              <div style={{fontSize:9,color:MT,textTransform:"uppercase",fontFamily:"IBM Plex Mono,monospace",letterSpacing:"0.1em",marginTop:3}}>{l}</div>
            </div>
          ))}
        </div>
      </section>

      {/* modules */}
      <section style={{maxWidth:960,margin:"0 auto",padding:"60px 24px"}}>
        <div style={{textAlign:"center",marginBottom:48}}>
          <div style={{fontSize:10,color:G,fontFamily:"IBM Plex Mono,monospace",letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:10}}>Módulos</div>
          <h2 style={{fontSize:"clamp(28px,4vw,44px)",fontFamily:"Cormorant Garamond,serif",fontWeight:600,color:TX}}>{es?"Todo lo que necesita tu área de RRHH":"Everything your HR department needs"}</h2>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:2,background:BD,borderRadius:12,overflow:"hidden"}}>
          {[
            {n:"01",icon:"◈",title:es?"Análisis de CVs":"CV Analyzer",sub:"CV Analyzer",desc:es?"Evaluá candidatos con IA. Scoring, fortalezas, brechas y perfil conductual.":"Evaluate candidates with AI. Scoring, strengths, gaps and behavioral profile.",color:G},
            {n:"02",icon:"◇",title:es?"Documentos HR":"HR Documents",sub:"Document Generator",desc:es?"Generá contratos, ofertas y evaluaciones en segundos.":"Generate contracts, offers and reviews in seconds.",color:"#5b8ab0"},
            {n:"03",icon:"◉",title:es?"Onboarding Bot":"Onboarding Bot",sub:"Onboarding Assistant",desc:es?"Asistente entrenado con el manual y políticas de tu empresa. 24/7.":"Assistant trained on your company handbook and policies. 24/7.",color:"#7c6fbc"},
            {n:"04",icon:"◐",title:"DK Profile",sub:"Behavioral Assessment",desc:es?"Evaluación conductual de 25 preguntas basada en DISC. Radar instantáneo.":"25-question behavioral assessment based on DISC. Instant radar.",color:"#a06848"},
          ].map((m,i)=>(
            <div key={i} style={{background:CD,padding:"32px 28px",position:"relative",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background=SF} onMouseLeave={e=>e.currentTarget.style.background=CD}>
              <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,"+m.color+",transparent)"}}/>
              <div style={{fontSize:9,color:m.color+"80",fontFamily:"IBM Plex Mono,monospace",marginBottom:16}}>{m.n}</div>
              <div style={{fontSize:26,color:m.color,marginBottom:12}}>{m.icon}</div>
              <h3 style={{fontSize:18,fontWeight:600,fontFamily:"Cormorant Garamond,serif",color:TX,marginBottom:3}}>{m.title}</h3>
              <div style={{fontSize:9,color:m.color+"80",fontFamily:"IBM Plex Mono,monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:12}}>{m.sub}</div>
              <p style={{fontSize:13,color:TX+"75",lineHeight:1.7}}>{m.desc}</p>
            </div>
          ))}
        </div>
        <div style={{textAlign:"center",marginTop:48}}>
          <button onClick={()=>setPage("app")} style={{padding:"13px 36px",borderRadius:8,border:"1px solid "+G+"40",background:G+"08",color:G,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"IBM Plex Sans,sans-serif"}}>
            {es?"Probar la plataforma →":"Try the platform →"}
          </button>
        </div>
      </section>

      <footer style={{borderTop:"1px solid "+BD,padding:"28px 40px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
        <span style={{fontSize:18,fontWeight:700,fontFamily:"Cormorant Garamond,serif",color:G,letterSpacing:"0.18em"}}>DKHR</span>
        <div style={{display:"flex",gap:20}}>{["ES","EN","PT","FR","DE"].map(l=><span key={l} style={{fontSize:10,color:MT,fontFamily:"IBM Plex Mono,monospace"}}>{l}</span>)}</div>
        <span style={{fontSize:11,color:MT,fontFamily:"IBM Plex Mono,monospace"}}>Demo Mode · {new Date().getFullYear()}</span>
      </footer>
    </div>
  );

  // ── App ──────────────────────────────────────────────────────────
  return(
    <div style={{minHeight:"100vh",background:BG,color:TX}}>
      <header style={{borderBottom:"1px solid "+BD,padding:"0 24px",height:60,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,background:BG+"f0",backdropFilter:"blur(10px)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button onClick={()=>setPage("landing")} style={{...ghostBtn,fontSize:10}}>← Inicio</button>
          <div style={{width:1,height:18,background:BD}}/>
          <span style={{fontSize:18,fontWeight:700,fontFamily:"Cormorant Garamond,serif",color:G,letterSpacing:"0.16em"}}>DKHR</span>
        </div>
        <div style={{display:"flex",gap:4}}>
          {["es","en","pt"].map(l=>(
            <button key={l} onClick={()=>setLang(l)} style={{padding:"4px 9px",border:"1px solid "+(lang===l?G:BD),borderRadius:4,background:lang===l?G+"12":"transparent",color:lang===l?G:MT,cursor:"pointer",fontSize:10,fontFamily:"IBM Plex Mono,monospace"}}>{l.toUpperCase()}</button>
          ))}
        </div>
      </header>

      {/* demo banner */}
      <div style={{background:"#a0684812",borderBottom:"1px solid #a0684830",padding:"6px 20px",textAlign:"center"}}>
        <span style={{fontSize:10,color:"#c48a6a",fontFamily:"IBM Plex Mono,monospace",letterSpacing:"0.06em"}}>⚡ MODO DEMO — Respuestas de muestra. Activá la API key para usar IA real.</span>
      </div>

      <main style={{maxWidth:880,margin:"0 auto",padding:"28px 20px"}}>
        {/* tabs */}
        <div style={{display:"flex",background:CD,borderRadius:8,padding:"3px",border:"1px solid "+BD,marginBottom:28,gap:2,overflowX:"auto"}}>
          {tabs.map((t,i)=><button key={i} style={tabBtn(tab===i)} onClick={()=>setTab(i)}>{t}</button>)}
        </div>

        {/* CVs */}
        {tab===0&&(
          <div>
            <div style={card}>
              <label style={lbl}>{es?"Descripción del puesto":"Job description"}</label>
              <textarea rows={4} style={inp} placeholder={es?"Pegá la descripción del puesto...":"Paste the job description..."} value={jd} onChange={e=>setJd(e.target.value)}/>
            </div>
            <div style={card}>
              <label style={lbl}>{es?"CVs de candidatos":"Candidate CVs"}</label>
              {cvs.map((cv,i)=>(
                <div key={i} style={{display:"flex",gap:8,marginBottom:8,alignItems:"flex-start"}}>
                  <div style={{width:22,height:22,borderRadius:"50%",background:G+"18",border:"1px solid "+G+"40",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:600,color:G,flexShrink:0,marginTop:12,fontFamily:"IBM Plex Mono,monospace"}}>{i+1}</div>
                  <textarea rows={3} style={{...inp,flex:1}} placeholder={"CV #"+(i+1)} value={cv} onChange={e=>{const n=[...cvs];n[i]=e.target.value;setCvs(n);}}/>
                  {cvs.length>1&&<button style={ghostBtn} onClick={()=>setCvs(cvs.filter((_,j)=>j!==i))}>×</button>}
                </div>
              ))}
              {cvs.length<5&&<button style={{...ghostBtn,color:G,borderColor:G+"40",marginTop:4}} onClick={()=>setCvs([...cvs,""])}>+ {es?"Agregar CV":"Add CV"}</button>}
            </div>
            <button style={primaryBtn} onClick={doAnalyze} disabled={cvLoad}>{cvLoad?(es?"Analizando...":"Analyzing..."):(es?"Analizar candidatos":"Analyze candidates")}</button>
            {cvLoad&&<div style={{marginTop:12}}><Spinner/></div>}
            {cvRes&&(
              <div style={{marginTop:20}} className="fade">
                {cvRes.map((c,i)=>(
                  <div key={i} style={{...card,border:"1px solid "+(c.rank===1?G+"50":BD)}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                      <div style={{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:11,fontFamily:"IBM Plex Mono,monospace",background:c.rank===1?"linear-gradient(135deg,"+G+","+GL+")":c.rank===2?"#1e2238":"#1a1810",color:c.rank===1?"#06070d":c.rank===2?"#8090b0":"#8a6840",flexShrink:0}}>#{c.rank}</div>
                      <div style={{fontWeight:600,fontSize:15,flex:1}}>{c.candidate}</div>
                      <div style={{padding:"3px 10px",borderRadius:4,background:G+"12",border:"1px solid "+G+"40",fontSize:18,fontWeight:700,color:G,fontFamily:"IBM Plex Mono,monospace"}}>{c.score}<span style={{fontSize:10,color:MT,marginLeft:2}}>/100</span></div>
                    </div>
                    <div style={{fontSize:13,color:MT,lineHeight:1.8,marginBottom:10}}>{c.summary}</div>
                    <div style={{marginBottom:8}}>
                      <span style={{fontSize:9,fontWeight:600,color:"#6aad8e",marginRight:8,textTransform:"uppercase",letterSpacing:"0.1em",fontFamily:"IBM Plex Mono,monospace"}}>{es?"Fortalezas":"Strengths"}</span>
                      {c.strengths.map((x,j)=><span key={j} style={{display:"inline-block",padding:"2px 8px",borderRadius:3,fontSize:11,margin:"2px",background:SU+"18",color:"#6aad8e",border:"1px solid "+SU+"40"}}>{x}</span>)}
                    </div>
                    <div style={{marginBottom:12}}>
                      <span style={{fontSize:9,fontWeight:600,color:"#ad6a6a",marginRight:8,textTransform:"uppercase",letterSpacing:"0.1em",fontFamily:"IBM Plex Mono,monospace"}}>{es?"Brechas":"Gaps"}</span>
                      {c.gaps.map((x,j)=><span key={j} style={{display:"inline-block",padding:"2px 8px",borderRadius:3,fontSize:11,margin:"2px",background:DA+"18",color:"#ad6a6a",border:"1px solid "+DA+"40"}}>{x}</span>)}
                    </div>
                    <div style={{borderTop:"1px solid "+BD,paddingTop:14}}>
                      <div style={{fontSize:10,fontWeight:600,color:G,letterSpacing:"0.1em",textTransform:"uppercase",fontFamily:"IBM Plex Mono,monospace",marginBottom:10}}>DK Profile</div>
                      <div style={{fontSize:12,color:MT,marginBottom:12,fontStyle:"italic"}}>{c.pdaProfile}</div>
                      <div style={{display:"grid",gridTemplateColumns:"180px 1fr",gap:16,alignItems:"center"}}>
                        <RadarSVG data={c.pda} axes={axes}/>
                        <Bars pda={c.pda} axes={axes}/>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* Documentos */}
        {tab===1&&(
          <div>
            <div style={card}>
              <label style={lbl}>{es?"Tipo de documento":"Document type"}</label>
              <select style={{...inp,resize:"none"}} value={docType} onChange={e=>{setDocType(Number(e.target.value));setDocRes(null);}}>
                {docTypes.map((d,i)=><option key={i} value={i}>{d}</option>)}
              </select>
            </div>
            <div style={card}>
              <label style={lbl}>{es?"Detalles del documento":"Document details"}</label>
              <textarea rows={5} style={inp} placeholder={es?"Nombre, puesto, salario, fecha de inicio...":"Name, position, salary, start date..."} value={docDet} onChange={e=>setDocDet(e.target.value)}/>
            </div>
            <button style={primaryBtn} onClick={doDoc} disabled={docLoad}>{docLoad?(es?"Generando...":"Generating..."):(es?"Generar documento":"Generate document")}</button>
            {docLoad&&<div style={{marginTop:12}}><Spinner/></div>}
            {docRes&&(
              <div style={{marginTop:18}} className="fade">
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                  <span style={{fontSize:10,color:G,fontFamily:"IBM Plex Mono,monospace",textTransform:"uppercase",letterSpacing:"0.06em"}}>{docTypes[docType]}</span>
                  <button style={ghostBtn} onClick={()=>{try{navigator.clipboard.writeText(docRes);}catch(e){}setCopied(true);setTimeout(()=>setCopied(false),2000);}}>{copied?(es?"Copiado ✓":"Copied ✓"):(es?"Copiar":"Copy")}</button>
                </div>
                <div style={{background:SF,border:"1px solid "+BD,borderRadius:8,padding:18,whiteSpace:"pre-wrap",fontSize:12,lineHeight:1.9,color:TX,maxHeight:380,overflow:"auto",fontFamily:"IBM Plex Mono,monospace"}}>{docRes}</div>
              </div>
            )}
          </div>
        )}

        {/* Onboarding */}
        {tab===2&&(
          <div>
            <div style={card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <label style={{...lbl,marginBottom:0}}>{es?"Políticas y manual de la empresa":"Company policies & handbook"}</label>
                <div style={{padding:"3px 10px",borderRadius:20,background:botOn?SU+"18":DA+"18",color:botOn?"#6aad8e":"#ad6a6a",fontSize:10,fontFamily:"IBM Plex Mono,monospace",border:"1px solid "+(botOn?SU+"40":DA+"40")}}>● {botOn?(es?"Activo":"Active"):(es?"Inactivo":"Inactive")}</div>
              </div>
              <textarea rows={4} style={inp} placeholder={es?"Pegá el reglamento, políticas de RRHH, beneficios...":"Paste your HR policies, handbook, benefits..."} value={ctx} onChange={e=>{setCtx(e.target.value);if(botOn)setBotOn(false);}}/>
              <div style={{marginTop:10}}><button style={primaryBtn} onClick={activateBot}>{es?"Activar asistente":"Activate assistant"}</button></div>
            </div>
            <div style={{background:SF,border:"1px solid "+BD,borderRadius:10,height:280,overflowY:"auto",padding:14,marginBottom:10}}>
              {!botOn&&msgs.length===0&&<div style={{textAlign:"center",color:DM,fontSize:12,marginTop:100,fontFamily:"IBM Plex Mono,monospace"}}>{es?"Activá el asistente para comenzar.":"Activate the assistant to start."}</div>}
              {msgs.map((m,i)=>(
                <div key={i} style={{display:"flex",justifyContent:m.r==="u"?"flex-end":"flex-start",marginBottom:8}}>
                  <div style={{maxWidth:"74%",padding:"10px 13px",borderRadius:m.r==="u"?"10px 10px 3px 10px":"10px 10px 10px 3px",background:m.r==="u"?G:CD,color:m.r==="u"?"#06070d":TX,fontSize:13,lineHeight:1.65,border:"1px solid "+(m.r==="u"?"transparent":BD)}}>{m.c}</div>
                </div>
              ))}
              {botLoad&&<div style={{display:"flex",justifyContent:"flex-start",marginBottom:8}}><div style={{padding:"10px 14px",borderRadius:"10px 10px 10px 3px",background:CD,border:"1px solid "+BD}}><Spinner/></div></div>}
              <div ref={chatRef}/>
            </div>
            <div style={{display:"flex",gap:8}}>
              <input type="text" style={{...inp,flex:1,resize:"none"}} placeholder={es?"Consultá sobre las políticas...":"Ask about the policies..."} value={chatIn} onChange={e=>setChatIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendMsg()} disabled={!botOn}/>
              <button style={{...primaryBtn,opacity:botOn?1:.4,flexShrink:0}} onClick={sendMsg} disabled={!botOn||botLoad}>{es?"Enviar":"Send"}</button>
            </div>
          </div>
        )}

        {/* DK Profile */}
        {tab===3&&<DKTest lang={lang}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
