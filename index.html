  {id:1,ax:"D",es:"Me siento cómodo/a tomando decisiones rápidas, incluso con información incompleta.",en:"I feel comfortable making quick decisions, even with incomplete information.",fr:"Je me sens à l'aise pour prendre des décisions rapides.",de:"Ich fühle mich wohl dabei, schnelle Entscheidungen zu treffen.",zh:"我能在信息不完整的情况下快速做出决策。"},
  {id:2,ax:"D",es:"Cuando hay un obstáculo, mi primer impulso es enfrentarlo directamente.",en:"When there's an obstacle, my first impulse is to face it head-on.",fr:"Face à un obstacle, mon premier réflexe est de l'affronter.",de:"Bei Hindernissen ist mein erster Impuls, diese direkt anzugehen.",zh:"面对障碍时，我的第一反应是直接面对。"},
  {id:3,ax:"D",es:"Prefiero liderar un proyecto antes que seguir las instrucciones de otro.",en:"I prefer to lead a project rather than follow someone else's instructions.",fr:"Je préfère diriger un projet plutôt que de suivre les instructions d'un autre.",de:"Ich leite lieber ein Projekt als Anweisungen zu befolgen.",zh:"我更喜欢领导项目而不是执行他人的指令。"},
  {id:4,ax:"D",es:"Me incomoda esperar la aprobación de otros para actuar.",en:"I feel uncomfortable waiting for others' approval before acting.",fr:"Je me sens mal à l'aise d'attendre l'approbation des autres.",de:"Es ist mir unangenehm, auf die Zustimmung anderer zu warten.",zh:"等待他人批准才能行动让我感到不舒适。"},
  {id:5,ax:"D",es:"Asumo riesgos calculados con naturalidad cuando creo en algo.",en:"I naturally take calculated risks when I believe in something.",fr:"Je prends naturellement des risques calculés quand je crois en quelque chose.",de:"Ich gehe natürlich kalkulierte Risiken ein, wenn ich an etwas glaube.",zh:"当我相信某件事时，我会自然地承担合理风险。"},
  {id:6,ax:"E",es:"Disfruto conocer gente nueva en entornos profesionales.",en:"I enjoy meeting new people in professional settings.",fr:"J'aime rencontrer de nouvelles personnes dans des contextes professionnels.",de:"Ich genieße es, neue Menschen in beruflichen Umfeldern kennenzulernen.",zh:"我喜欢在职业环境中结识新朋友。"},
  {id:7,ax:"E",es:"Me resulta fácil hablar en público o ante grupos grandes.",en:"I find it easy to speak in public or in front of large groups.",fr:"Je trouve facile de parler en public ou devant de grands groupes.",de:"Es fällt mir leicht, öffentlich zu sprechen.",zh:"我发现在公众场合或大型群体前发言很容易。"},
  {id:8,ax:"E",es:"Genero entusiasmo en los equipos con los que trabajo.",en:"I generate enthusiasm in the teams I work with.",fr:"Je génère de l'enthousiasme dans les équipes avec lesquelles je travaille.",de:"Ich erzeuge Begeisterung in den Teams, mit denen ich arbeite.",zh:"我能在团队中激发热情。"},
  {id:9,ax:"E",es:"Prefiero resolver problemas hablando con otros antes que pensar solo/a.",en:"I prefer solving problems by talking with others rather than thinking alone.",fr:"Je préfère résoudre les problèmes en discutant avec d'autres.",de:"Ich löse Probleme lieber im Gespräch mit anderen.",zh:"我更喜欢与他人交流来解决问题。"},
  {id:10,ax:"E",es:"Las reuniones sociales me dan energía en lugar de agotarme.",en:"Social gatherings energize me rather than drain me.",fr:"Les réunions sociales m'énergisent plutôt qu'elles ne m'épuisent.",de:"Gesellschaftliche Treffen geben mir Energie.",zh:"社交聚会让我充满活力而不是感到疲惫。"},
  {id:11,ax:"P",es:"Prefiero un entorno de trabajo estable y predecible.",en:"I prefer a stable and predictable work environment.",fr:"Je préfère un environnement de travail stable et prévisible.",de:"Ich bevorzuge ein stabiles und vorhersehbares Arbeitsumfeld.",zh:"我更喜欢稳定可预测的工作环境。"},
  {id:12,ax:"P",es:"Soy constante en mis tareas y rara vez dejo proyectos a medias.",en:"I am consistent in my tasks and rarely leave projects unfinished.",fr:"Je suis constant(e) et laisse rarement des projets inachevés.",de:"Ich bin beständig und lasse selten Projekte unfertig.",zh:"我做事有始有终，很少半途而废。"},
  {id:13,ax:"P",es:"Apoyo a mis compañeros con paciencia incluso cuando cometen errores.",en:"I support my colleagues patiently even when they make mistakes.",fr:"Je soutiens mes collègues avec patience même quand ils font des erreurs.",de:"Ich unterstütze Kollegen geduldig, auch wenn sie Fehler machen.",zh:"即使同事犯错，我也能耐心地支持他们。"},
  {id:14,ax:"P",es:"Me tomo el tiempo necesario para pensar antes de responder o actuar.",en:"I take the necessary time to think before responding or acting.",fr:"Je prends le temps nécessaire pour réfléchir avant d'agir.",de:"Ich nehme mir Zeit zum Nachdenken, bevor ich handle.",zh:"我会在回应或行动前花必要的时间思考。"},

  {id:18,ax:"N",es:"Presto mucha atención a los detalles, incluso en tareas menores.",en:"I pay close attention to details, even in minor tasks.",fr:"Je fais très attention aux détails, même dans les tâches mineures.",de:"Ich achte sehr auf Details, auch bei kleineren Aufgaben.",zh:"即使在小任务中，我也非常关注细节。"},
  {id:19,ax:"N",es:"Las reglas y normas me dan claridad y seguridad para trabajar mejor.",en:"Rules and norms give me clarity and security to work better.",fr:"Les règles me donnent de la clarté pour mieux travailler.",de:"Regeln geben mir Klarheit, um besser zu arbeiten.",zh:"规则和规范让我更清晰地工作。"},
  {id:20,ax:"N",es:"Analizo en profundidad antes de tomar una decisión importante.",en:"I analyze in depth before making an important decision.",fr:"J'analyse en profondeur avant de prendre une décision importante.",de:"Ich analysiere gründlich, bevor ich eine wichtige Entscheidung treffe.",zh:"做重要决定前，我会深入分析。"},

  {id:23,ax:"A",es:"Cuando algo no sale como esperaba, me recupero rápidamente.",en:"When something doesn't go as expected, I recover quickly.",fr:"Quand quelque chose ne se passe pas comme prévu, je me remets rapidement.",de:"Wenn etwas nicht wie erwartet läuft, erhole ich mich schnell.",zh:"当事情不如预期时，我能快速恢复。"},
  {id:24,ax:"A",es:"Puedo trabajar eficientemente con personas de estilos muy distintos al mío.",en:"I can work efficiently with people of very different styles.",fr:"Je peux travailler efficacement avec des personnes de styles très différents.",de:"Ich kann effizient mit Menschen sehr unterschiedlicher Stile arbeiten.",zh:"我能与风格迥异的人高效合作。"},

// ── Radar SVG ─────────────────────────────────────────────────────
function RadarSVG({data,axes}){
  const size=200,cx=100,cy=100,r=72;
  const keys=Object.keys(axes),n=keys.length;
  const ang=i=>(i*2*Math.PI/n)-Math.PI/2;
  const pt=(i,v)=>{const a=ang(i),d=(v/100)*r;return[cx+d*Math.cos(a),cy+d*Math.sin(a)];};
  const gpts=s=>keys.map((_,i)=>pt(i,s)).map(p=>p.join(",")).join(" ");
  const dpts=keys.map((k,i)=>pt(i,data[k]||0)).map(p=>p.join(",")).join(" ");
  return e("svg",{width:size,height:size,viewBox:"0 0 200 200",style:{filter:"drop-shadow(0 0 10px rgba(79,172,247,0.15))"}},
    e("defs",null,
      e("linearGradient",{id:"rg",x1:"0%",y1:"0%",x2:"100%",y2:"100%"},
        e("stop",{offset:"0%",stopColor:"#4facf7",stopOpacity:"0.7"}),
        e("stop",{offset:"100%",stopColor:"#7c6fbc",stopOpacity:"0.7"}))),
    [25,50,75,100].map(s=>e("polygon",{key:s,points:gpts(s),fill:"none",stroke:"rgba(255,255,255,0.05)",strokeWidth:"1"})),
    keys.map((_,i)=>{const[x,y]=pt(i,100);return e("line",{key:i,x1:cx,y1:cy,x2:x,y2:y,stroke:"rgba(255,255,255,0.06)",strokeWidth:"1"});}),
    e("polygon",{points:dpts,fill:"url(#rg)",fillOpacity:"0.18",stroke:"url(#rg)",strokeWidth:"2"}),
    keys.map((k,i)=>{const[x,y]=pt(i,data[k]||0);return e("circle",{key:i,cx:x,cy:y,r:"3.5",fill:"#4facf7",style:{filter:"drop-shadow(0 0 4px #4facf7)"}});}),
    keys.map((k,i)=>{const[x,y]=pt(i,120);return e("text",{key:i,x,y,textAnchor:"middle",dominantBaseline:"middle",fill:"rgba(255,255,255,0.7)",fontSize:"8.5",fontFamily:"IBM Plex Mono,monospace"},axes[k]);})
  );
}
